name: Infrastructure Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Cosmos DB emulator
        run: |
          docker run -d \
            --name cosmos \
            -p 8081:8081 \
            -e AZURE_COSMOS_EMULATOR_PARTITION_COUNT=3 \
            -e AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=false \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview

      - name: Wait for Cosmos emulator to be ready
        run: |
          echo "Waiting for Cosmos emulator..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/_explorer/emulator.pem > /dev/null 2>&1; then
              echo "Emulator ready after $((i * 5))s."
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Emulator did not become ready in time."
              docker logs cosmos
              exit 1
            fi
            echo "  attempt $i/30, retrying in 5s..."
            sleep 5
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore AgentPayWatch.slnx

      - name: Build
        run: dotnet build AgentPayWatch.slnx --no-restore --configuration Release

      - name: Run infrastructure tests
        env:
          COSMOS_CONNECTION_STRING: "AccountEndpoint=http://localhost:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
        run: |
          dotnet test tests/AgentPayWatch.Infrastructure.Tests/AgentPayWatch.Infrastructure.Tests.csproj \
            --no-build --configuration Release \
            --logger "trx;LogFileName=infra-tests.trx" \
            --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5  # v1.9.1
        if: always()
        with:
          name: Infrastructure Tests
          path: test-results/infra-tests.trx
          reporter: dotnet-trx
